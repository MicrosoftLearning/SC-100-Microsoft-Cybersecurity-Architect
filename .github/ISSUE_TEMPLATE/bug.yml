name: Bug Report
description: Report a bug or issue with an SC-100 lab or demo
title: "LAB00: QUICK_DESCRIPTION"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        # Thanks for taking the time to fill out this bug report!
        
        **Replace the issue title LAB00: QUICK_DESCRIPTION, for example "LAB01: Broken screenshot in Task 2"**
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info 😉?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What happened?
      placeholder: Tell us what you see!
      value: |
        Exercise : 00
        Task: 00
        Step: 00
        
        Description of issue:

        Repro steps:
        1.
        1.
        1.
    validations:
      required: true
  - type: dropdown
    id: version
    attributes:
      label: Lab
      description: Which lab does this issue relate to?
      options:
        - Other
        - Lab 1 Ex 1 - Security Operations Center
        - Lab 1 Ex 2 - Managing External Attack Surface
        - Lab 1 Ex 3 - Secure Infrastructure
        - Lab 2 Ex 1 - Configure Entra ID
        - Lab 2 Ex 2 - Conditional Access
        - Lab 2 Ex 3 - Cross-tenant Synchronization
        - Lab 2 Ex 4 - Shadow-IT
        - Lab 3 Ex 1 - Compliance assessment
        - Lab 3 Ex 2 - Data classification framework
        - Lab 3 Ex 3 - Retention policies
        - Lab 4 Ex 1 - Security Posture Management
        - Lab 4 Ex 4 - Endpoint Security
    validations:
      required: true
  - type: textarea
    id: Screenshots
    attributes:
      label: Relevant screenshots
      description: Please copy and paste any relevant screenshots 📸
      value: paste here 😉 
  - type: checkboxes
    id: terms
    attributes:
      label: Do you want to help us? 👏
      description: GitHub/Git uses Pull Requests (PR) to propose and collaborate on changes to a repository. **No git/github experience?** Follow the [video in the Contribution Guide](https://github.com/MicrosoftLearning/AZ400-DesigningandImplementingMicrosoftDevOpsSolutions/blob/master/.github/CONTRIBUTING.md#easy-prs-using-github-no-gitgithub-knowledge-needed)
      options:
        - label: Create a Pull Request by following this project's [Contribution Guide](https://github.com/MicrosoftLearning/SC-100-Microsoft-Cybersecurity-Architect/blob/master/.github/CONTRIBUTING.md#how-can-i-collaborate)
          required: false
